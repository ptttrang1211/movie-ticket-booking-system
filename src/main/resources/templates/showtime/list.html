<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
    <meta charset="UTF-8"/>
    <title>Lịch chiếu - TRANGGDCinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-camera-reels-fill text-danger me-1"></i>TRANGGDCinema
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/movies}">Phim</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/showtimes}">Lịch chiếu</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/promotions}">Khuyến mãi</a></li>
            </ul>
            <div class="d-flex gap-2 align-items-center">
                <div sec:authorize="isAuthenticated()">
                    <span class="nav-link text-white">
                        <i class="bi bi-person-circle me-1"></i>
                        <span sec:authentication="name"></span>
                    </span>
                </div>
                <div sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-sm btn-outline-danger">Đăng xuất</button>
                    </form>
                </div>
                <div sec:authorize="!isAuthenticated()">
                    <a th:href="@{/auth/login}" class="btn btn-sm btn-outline-light me-1">Đăng nhập</a>
                    <a th:href="@{/auth/register}" class="btn btn-sm btn-danger">Đăng ký</a>
                </div>
            </div>
        </div>
    </div>
</nav>

<div class="container py-4">

    <h4 class="fw-bold mb-4">Lịch chiếu phim</h4>

    <!-- Filter row -->
    <form th:action="@{/showtimes}" method="get" class="row g-2 mb-4">

        <!-- Chọn ngày — 7 ngày tới -->
        <div class="col-12">
            <div class="d-flex gap-2 flex-wrap">
                <a th:each="d : ${dateRange}"
                   th:href="@{/showtimes(date=${d},branchId=${selectedBranchId},movieId=${selectedMovieId})}"
                   th:classappend="${d == selectedDate} ? ' active'"
                   class="btn btn-sm btn-outline-secondary date-btn">
                    <div class="fw-bold"
                         th:text="${#temporals.format(d, 'dd')}"></div>
                    <div class="small"
                         th:text="${#temporals.format(d, 'EEE', new java.util.Locale('vi'))}"></div>
                </a>
            </div>
        </div>

        <!-- Chọn chi nhánh -->
        <div class="col-md-4">
            <select name="branchId" class="form-select" onchange="this.form.submit()">
                <option value="">-- Tất cả chi nhánh --</option>
                <option th:each="branch : ${branches}"
                        th:value="${branch.branchId}"
                        th:text="${branch.branchName}"
                        th:selected="${branch.branchId == selectedBranchId}"></option>
            </select>
        </div>

        <!-- Chọn phim -->
        <div class="col-md-4">
            <select name="movieId" class="form-select" onchange="this.form.submit()">
                <option value="">-- Tất cả phim --</option>
                <option th:each="movie : ${movies}"
                        th:value="${movie.movieId}"
                        th:text="${movie.movieNameVn != null ? movie.movieNameVn : movie.movieNameEnglish}"
                        th:selected="${movie.movieId == selectedMovieId}"></option>
            </select>
        </div>

        <input type="hidden" name="date"
               th:value="${#temporals.format(selectedDate, 'yyyy-MM-dd')}"/>
    </form>

    <!-- Showtime list -->
    <div th:if="${#lists.isEmpty(showtimes)}"
         class="text-center py-5 text-muted">
        <i class="bi bi-calendar-x fs-1 d-block mb-2"></i>
        Không có suất chiếu nào trong ngày này.
    </div>

    <div th:unless="${#lists.isEmpty(showtimes)}">
        <div class="row g-3">
            <div class="col-md-6 col-lg-4" th:each="st : ${showtimes}">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <div class="d-flex gap-3">
                            <img th:if="${st.movie.smallImage}"
                                 th:src="${st.movie.smallImageSrc}"
                                 width="72" class="rounded" alt="poster"/>
                            <div class="flex-grow-1">
                                <h6 class="fw-bold mb-1"
                                    th:text="${st.movie.movieNameVn != null ? st.movie.movieNameVn : st.movie.movieNameEnglish}"></h6>
                                <div class="small text-muted mb-1">
                                    <span th:text="${st.movie.duration}"></span> phút
                                    ·
                                    <span th:text="${st.movie.version}"></span>
                                </div>
                                <div class="small text-muted mb-1">
                                    <i class="bi bi-geo-alt me-1"></i>
                                    <span th:text="${st.cinemaRoom.branch.branchName}"></span>
                                </div>
                                <div class="small text-muted mb-2">
                                    <i class="bi bi-building me-1"></i>
                                    <span th:text="${st.cinemaRoom.cinemaRoomName}"></span>
                                </div>
                                <div class="d-flex align-items-center gap-2 flex-wrap">
                                    <span class="badge bg-danger" th:text="${st.showTime}"></span>
                                    <span class="badge text-bg-light"
                                          th:text="${#temporals.format(st.showDate, 'dd/MM/yyyy')}"></span>
                                </div>
                            </div>
                        </div>
                        <div class="mt-3">
                            <a th:href="@{/movies/{id}(id=${st.movie.movieId})}"
                               class="btn btn-outline-secondary btn-sm">
                                Chi tiết phim
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<footer class="bg-dark text-white text-center py-3 mt-5">
    <small>&copy; 2025 TRANGGDCinema. All rights reserved.</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<style>
    .date-btn { min-width: 52px; text-align: center; }
    .date-btn.active { background-color: #dc3545; border-color: #dc3545; color: white; }
    .time-btn { min-width: 80px; }
</style>
</body>
</html>
