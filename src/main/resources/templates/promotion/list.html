<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Khuyến mãi - TRANGGDCinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}"><i class="bi bi-camera-reels-fill text-danger me-1"></i>TRANGGDCinema</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/movies}">Phim</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/showtimes}">Lịch chiếu</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/promotions}">Khuyến mãi</a></li>
            </ul>
        </div>
    </div>
</nav>
<div class="container py-4">
    <h4 class="fw-bold mb-4">Khuyến mãi đang áp dụng</h4>
    <div th:if="${#lists.isEmpty(promotions)}" class="text-center py-5 text-muted">
        Hiện chưa có khuyến mãi nào.
    </div>
    <div class="row row-cols-1 row-cols-md-3 g-3">
        <div class="col" th:each="p : ${promotions}">
            <div class="card h-100 shadow-sm">
                <img th:if="${p.image}"
                     th:src="@{/uploads/{img}(img=${p.image})}"
                     class="card-img-top" style="height:160px;object-fit:cover" alt=""/>
                <div class="card-body">
                    <h6 class="fw-bold" th:text="${p.title}"></h6>
                    <p class="small text-muted" th:text="${p.detail}"></p>
                    <div class="badge bg-danger fs-6">
                        Giảm <span th:text="${#numbers.formatInteger(p.discountLevel,1,'COMMA')}"></span>đ
                    </div>
                </div>
                <div class="card-footer small text-muted">
                    <i class="bi bi-clock me-1"></i>
                    HSD:
                    <span th:text="${p.endTime != null ? #temporals.format(p.endTime,'dd/MM/yyyy') : 'Không thời hạn'}"></span>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
