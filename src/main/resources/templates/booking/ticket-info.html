<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Thông tin vé - TRANGGDCinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        .ticket-card {
            border: 2px dashed #dc3545;
            border-radius: 16px;
            max-width: 480px;
            margin: 0 auto;
        }
        .ticket-divider {
            border-top: 2px dashed #dee2e6;
            margin: 16px -1px;
        }
        .status-waiting  { background: #fff3cd; color: #856404; }
        .status-confirmed{ background: #d1e7dd; color: #0a3622; }
        .status-cancelled{ background: #f8d7da; color: #58151c; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-camera-reels-fill text-danger me-1"></i>TRANGGDCinema
        </a>
    </div>
</nav>

<div class="container py-5">

    <!-- Success banner -->
    <div class="text-center mb-4">
        <div class="bg-success bg-opacity-10 rounded-circle d-inline-flex p-3 mb-3">
            <i class="bi bi-check-circle-fill text-success fs-1"></i>
        </div>
        <h4 class="fw-bold">Đặt vé thành công!</h4>
        <p class="text-muted">Mang mã đặt vé ra quầy để nhận vé.</p>
    </div>

    <!-- Ticket card -->
    <div class="ticket-card p-4 shadow-sm">

        <!-- Header -->
        <div class="text-center mb-3">
            <div class="fw-bold text-danger fs-5 mb-1">TRANGGDCinema</div>
            <div class="badge px-3 py-2"
                 th:classappend="${invoice.invoiceStatus.name() == 'WAITING'}
                     ? 'status-waiting'
                     : (${invoice.invoiceStatus.name() == 'CONFIRMED'}
                         ? 'status-confirmed' : 'status-cancelled')"
                 th:text="${invoice.invoiceStatus.name() == 'WAITING'} ? 'Chờ xác nhận'
                     : (${invoice.invoiceStatus.name() == 'CONFIRMED'} ? 'Đã xác nhận' : 'Đã hủy')">
            </div>
        </div>

        <!-- Booking code -->
        <div class="text-center bg-light rounded p-3 mb-3">
            <div class="text-muted small mb-1">Mã đặt vé</div>
            <div class="fw-bold fs-3 text-danger letter-spacing-wide"
                 th:text="${invoice.bookingCode}"></div>
        </div>

        <div class="ticket-divider"></div>

        <!-- Movie info -->
        <div class="mb-3">
            <div class="fw-bold fs-5 mb-2" th:text="${invoice.movieName}"></div>
            <div class="row g-2 small text-muted">
                <div class="col-6">
                    <i class="bi bi-building me-1"></i>
                    <span th:text="${invoice.cinemaRoom}"></span>
                </div>
                <div class="col-6">
                    <i class="bi bi-calendar3 me-1"></i>
                    <span th:text="${#temporals.format(invoice.scheduleShow, 'dd/MM/yyyy')}"></span>
                </div>
                <div class="col-6">
                    <i class="bi bi-clock me-1"></i>
                    <span class="text-danger fw-bold"
                          th:text="${invoice.scheduleShowTime}"></span>
                </div>
                <div class="col-6">
                    <i class="bi bi-grid me-1"></i>
                    Ghế: <span class="fw-bold" th:text="${invoice.seat}"></span>
                </div>
            </div>
        </div>

        <div class="ticket-divider"></div>

        <!-- Danh sách ticket (line items) -->
        <div class="mb-3">
            <div class="fw-semibold mb-2">Chi tiết vé:</div>
            <div th:each="ticket : ${tickets}"
                 class="d-flex justify-content-between small py-1 border-bottom">
                <span>
                    Ghế
                    <span th:text="${ticket.scheduleSeat.seat.seatRow}"></span>
                    <span th:text="${ticket.scheduleSeat.seat.seatColumn}"></span>
                    <span class="badge ms-1"
                          th:classappend="${ticket.ticketType.name() == 'VIP'}
                              ? 'bg-warning text-dark' : 'bg-secondary'"
                          th:text="${ticket.ticketType.name()}"></span>
                </span>
                <span th:text="${#numbers.formatInteger(ticket.price, 1, 'COMMA')} + 'đ'"></span>
            </div>
        </div>

        <!-- Tổng tiền -->
        <div class="d-flex justify-content-between fw-bold border-top pt-2">
            <span>Tổng tiền</span>
            <span class="text-danger"
                  th:text="${#numbers.formatInteger(invoice.totalMoney, 1, 'COMMA')} + 'đ'"></span>
        </div>

        <!-- Điểm -->
        <div th:if="${invoice.addScore > 0 or invoice.useScore > 0}"
             class="mt-2 small text-muted">
            <div th:if="${invoice.useScore > 0}">
                <i class="bi bi-dash-circle text-danger me-1"></i>
                Đã dùng <span th:text="${invoice.useScore}"></span> điểm
            </div>
            <div th:if="${invoice.addScore > 0}">
                <i class="bi bi-plus-circle text-success me-1"></i>
                Được cộng <span th:text="${invoice.addScore}"></span> điểm
            </div>
        </div>

        <!-- Promotion -->
        <div th:if="${invoice.promotion != null}"
             class="mt-2 small text-success">
            <i class="bi bi-tag me-1"></i>
            KM: <span th:text="${invoice.promotion.title}"></span>
        </div>

        <div class="ticket-divider"></div>

        <!-- Booking date -->
        <div class="text-center text-muted small">
            <i class="bi bi-clock me-1"></i>
            Đặt lúc: <span th:text="${#temporals.format(invoice.bookingDate, 'HH:mm dd/MM/yyyy')}"></span>
        </div>

    </div>

    <!-- Actions -->
    <div class="text-center mt-4 d-flex justify-content-center gap-3">
        <a th:href="@{/home}" class="btn btn-outline-secondary">
            <i class="bi bi-house-door me-1"></i>Về trang chủ
        </a>
        <a th:href="@{/movies}" class="btn btn-danger">
            <i class="bi bi-film me-1"></i>Đặt thêm vé
        </a>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
