<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Chọn ghế - TRANGGDCinema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        .screen {
            background: linear-gradient(to bottom, #aaa, #fff);
            height: 8px; border-radius: 50%;
            margin: 0 auto 24px; width: 80%;
        }
        .screen-label {
            text-align: center; color: #888;
            font-size: 12px; margin-bottom: 20px;
        }
        .seat-btn {
            width: 36px; height: 36px;
            border-radius: 6px 6px 0 0;
            font-size: 11px; font-weight: 600;
            cursor: pointer; border: none;
            transition: all .15s;
        }
        .seat-btn.available-normal {
            background: #e9ecef; color: #333;
        }
        .seat-btn.available-vip {
            background: #fff3cd; color: #856404;
        }
        .seat-btn.sold {
            background: #dee2e6; color: #adb5bd;
            cursor: not-allowed; opacity: .6;
        }
        .seat-btn.selected {
            background: #dc3545; color: white;
            transform: scale(1.1);
        }
        .seat-btn:hover:not(.sold) {
            transform: scale(1.1);
            filter: brightness(0.9);
        }
        .legend-box {
            width: 20px; height: 20px;
            border-radius: 3px; display: inline-block;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-camera-reels-fill text-danger me-1"></i>TRANGGDCinema
        </a>
    </div>
</nav>

<div class="container py-4">

    <!-- Stepper -->
    <div class="d-flex align-items-center gap-2 mb-4" style="max-width:600px">
        <span class="badge bg-success rounded-pill px-3 py-2">1. Chi nhánh ✓</span>
        <div class="flex-grow-1 border-top"></div>
        <span class="badge bg-success rounded-pill px-3 py-2">2. Suất chiếu ✓</span>
        <div class="flex-grow-1 border-top"></div>
        <span class="badge bg-danger rounded-pill px-3 py-2">3. Chọn ghế</span>
        <div class="flex-grow-1 border-top"></div>
        <span class="badge bg-secondary rounded-pill px-3 py-2">4. Xác nhận</span>
    </div>

    <!-- Flash error -->
    <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

    <div class="row g-4">

        <!-- LEFT: Sơ đồ ghế -->
        <div class="col-lg-8">

            <!-- Showtime info -->
            <div class="p-3 bg-light rounded mb-3">
                <div class="fw-bold"
                     th:text="${showtime.movie.movieNameVn != null
                         ? showtime.movie.movieNameVn
                         : showtime.movie.movieNameEnglish}"></div>
                <small class="text-muted">
                    <i class="bi bi-geo-alt me-1"></i>
                    <span th:text="${showtime.cinemaRoom.branch.branchName}"></span> ·
                    <span th:text="${showtime.cinemaRoom.cinemaRoomName}"></span> ·
                    <span th:text="${#temporals.format(showtime.showDate, 'dd/MM/yyyy')}"></span> ·
                    <span class="text-danger fw-bold" th:text="${showtime.showTime}"></span>
                </small>
            </div>

            <!-- Màn chiếu -->
            <div class="screen"></div>
            <div class="screen-label">MÀN CHIẾU</div>

            <!-- Sơ đồ ghế -->
            <div th:each="rowEntry : ${seatsByRow}" class="d-flex justify-content-center gap-1 mb-1">

                <!-- Label hàng -->
                <div class="d-flex align-items-center" style="width:24px">
                    <span class="text-muted small" th:text="${rowEntry.key}"></span>
                </div>

                <!-- Các ghế trong hàng -->
                <div th:each="seat : ${rowEntry.value}">
                    <th:block th:with="
                        status=${seatStatusMap[seat.seatId] != null ? seatStatusMap[seat.seatId] : 'AVAILABLE'},
                        isVip=${seat.seatType.name() == 'VIP'},
                        isSold=${status == 'SOLD'}
                    ">
                        <button type="button"
                                th:id="'seat-' + ${seat.seatId}"
                                th:data-seat-id="${seat.seatId}"
                                th:data-seat-name="${seat.seatRow} + ${seat.seatColumn}"
                                th:data-price="${isVip ? vipPrice : normalPrice}"
                                th:data-vip="${isVip}"
                                th:disabled="${isSold}"
                                th:classappend="${isSold} ? ' sold' : (${isVip} ? ' available-vip' : ' available-normal')"
                                class="seat-btn"
                                onclick="toggleSeat(this)">
                            <span th:text="${seat.seatColumn}"></span>
                        </button>
                    </th:block>
                </div>

            </div>

            <!-- Legend -->
            <div class="d-flex justify-content-center gap-4 mt-4 small">
                <div class="d-flex align-items-center gap-1">
                    <span class="legend-box bg-secondary bg-opacity-25"></span> Trống (Thường)
                </div>
                <div class="d-flex align-items-center gap-1">
                    <span class="legend-box" style="background:#fff3cd"></span> Trống (VIP)
                </div>
                <div class="d-flex align-items-center gap-1">
                    <span class="legend-box bg-danger"></span> Đang chọn
                </div>
                <div class="d-flex align-items-center gap-1">
                    <span class="legend-box bg-secondary opacity-50"></span> Đã bán
                </div>
            </div>
        </div>

        <!-- RIGHT: Thông tin đặt vé -->
        <div class="col-lg-4">
            <div class="card shadow-sm sticky-top" style="top:20px">
                <div class="card-header bg-dark text-white fw-bold">
                    Thông tin đặt vé
                </div>
                <div class="card-body">

                    <!-- Ghế đã chọn -->
                    <div class="mb-3">
                        <div class="fw-semibold mb-1">Ghế đã chọn:</div>
                        <div id="selected-seats-display" class="text-muted small">
                            Chưa chọn ghế nào
                        </div>
                    </div>

                    <!-- Tổng tiền -->
                    <div class="d-flex justify-content-between mb-3">
                        <span class="fw-semibold">Tạm tính:</span>
                        <span class="fw-bold text-danger" id="subtotal-display">0đ</span>
                    </div>

                    <!-- Promotion -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Khuyến mãi:</label>
                        <select class="form-select form-select-sm" id="promotionSelect"
                                onchange="updateTotal()">
                            <option value="" data-discount="0">Không áp dụng</option>
                            <option th:each="p : ${promotions}"
                                    th:value="${p.promotionId}"
                                    th:data-discount="${p.discountLevel}"
                                    th:text="${p.title + ' (-' + #numbers.formatInteger(p.discountLevel, 1, 'COMMA') + 'đ)'}">
                            </option>
                        </select>
                    </div>

                    <!-- Dùng điểm -->
                    <div class="mb-3">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input"
                                   id="useScoreCheck" onchange="updateTotal()"/>
                            <label class="form-check-label" for="useScoreCheck">
                                Dùng điểm tích lũy để quy đổi
                            </label>
                        </div>
                    </div>

                    <!-- Tổng sau giảm -->
                    <div class="d-flex justify-content-between fw-bold fs-5 border-top pt-2 mb-3">
                        <span>Tổng tiền:</span>
                        <span class="text-danger" id="total-display">0đ</span>
                    </div>

                    <!-- Form submit -->
                    <form th:action="@{/booking/confirm}" method="post" id="bookingForm">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <input type="hidden" name="showtimeId"
                               th:value="${showtime.showTimeId}"/>
                        <input type="hidden" name="promotionId" id="promotionIdInput"/>
                        <input type="hidden" name="useScore"    id="useScoreInput" value="false"/>
                        <!-- seatIds sẽ được thêm bằng JS -->

                        <button type="button" class="btn btn-danger w-100 py-2 fw-bold"
                                id="confirmBtn" disabled onclick="submitBooking()">
                            <i class="bi bi-ticket-perforated me-1"></i>Xác nhận đặt vé
                        </button>
                    </form>

                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const selectedSeats = {};   // seatId → {name, price, isVip}

    function toggleSeat(btn) {
        if (btn.disabled) return;

        const seatId   = btn.dataset.seatId;
        const seatName = btn.dataset.seatName;
        const price    = parseInt(btn.dataset.price);
        const isVip    = btn.dataset.vip === 'true';

        if (selectedSeats[seatId]) {
            // Bỏ chọn
            delete selectedSeats[seatId];
            btn.classList.remove('selected');
            btn.classList.add(isVip ? 'available-vip' : 'available-normal');
        } else {
            // Chọn
            selectedSeats[seatId] = { name: seatName, price, isVip };
            btn.classList.add('selected');
            btn.classList.remove('available-vip', 'available-normal');
        }

        updateDisplay();
    }

    function updateDisplay() {
        const seats = Object.values(selectedSeats);
        const subTotal = seats.reduce((sum, s) => sum + s.price, 0);

        // Hiển thị ghế
        const seatDisplay = document.getElementById('selected-seats-display');
        if (seats.length === 0) {
            seatDisplay.textContent = 'Chưa chọn ghế nào';
        } else {
            seatDisplay.innerHTML = seats.map(s =>
                `<span class="badge ${s.isVip ? 'bg-warning text-dark' : 'bg-secondary'} me-1">
                ${s.name}
            </span>`
            ).join('');
        }

        document.getElementById('subtotal-display').textContent =
            subTotal.toLocaleString('vi-VN') + 'đ';

        updateTotal();

        // Enable/disable confirm button
        document.getElementById('confirmBtn').disabled = seats.length === 0;
    }

    function updateTotal() {
        const seats    = Object.values(selectedSeats);
        const subTotal = seats.reduce((sum, s) => sum + s.price, 0);

        const select   = document.getElementById('promotionSelect');
        const discount = parseInt(select.options[select.selectedIndex].dataset.discount || 0);
        const useScore = document.getElementById('useScoreCheck').checked;

        let total = Math.max(0, subTotal - discount);
        if (useScore) total = 0;

        document.getElementById('total-display').textContent =
            total.toLocaleString('vi-VN') + 'đ';
    }

    function submitBooking() {
        const seatIds = Object.keys(selectedSeats);
        if (seatIds.length === 0) {
            alert('Vui lòng chọn ít nhất 1 ghế!');
            return;
        }

        const form = document.getElementById('bookingForm');

        // Xóa input cũ
        form.querySelectorAll('input[name="seatIds"]').forEach(el => el.remove());

        // Thêm seatIds
        seatIds.forEach(id => {
            const input = document.createElement('input');
            input.type = 'hidden';
            input.name = 'seatIds';
            input.value = id;
            form.appendChild(input);
        });

        // Promotion
        const select = document.getElementById('promotionSelect');
        document.getElementById('promotionIdInput').value = select.value;

        // useScore
        document.getElementById('useScoreInput').value =
            document.getElementById('useScoreCheck').checked;

        form.submit();
    }
</script>
</body>
</html>
