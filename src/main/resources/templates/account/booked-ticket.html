<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Lịch sử đặt vé</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" th:href="@{/}">
      <i class="bi bi-camera-reels-fill text-danger me-1"></i>TRANGGDCinema
    </a>
  </div>
</nav>

<div class="container py-4">
  <div class="row g-4">
    <div class="col-md-3">
      <div class="card shadow-sm">
        <div class="list-group list-group-flush">
          <a th:href="@{/account/info}"          class="list-group-item list-group-item-action"><i class="bi bi-person me-2"></i>Thông tin</a>
          <a th:href="@{/account/booked-ticket}" class="list-group-item list-group-item-action active"><i class="bi bi-ticket me-2"></i>Lịch sử đặt vé</a>
          <a th:href="@{/account/score-history}" class="list-group-item list-group-item-action"><i class="bi bi-star me-2"></i>Lịch sử điểm</a>
        </div>
      </div>
    </div>

    <div class="col-md-9">
      <h5 class="fw-bold mb-3">Lịch sử đặt vé</h5>

      <div th:if="${#lists.isEmpty(invoices)}"
           class="text-center py-5 text-muted border rounded">
        <i class="bi bi-ticket fs-1 d-block mb-2"></i>
        Bạn chưa đặt vé nào.
      </div>

      <div class="d-flex flex-column gap-3">
        <div th:each="inv : ${invoices}" class="card shadow-sm">
          <div class="card-body">
            <div class="d-flex justify-content-between align-items-start">
              <div>
                <div class="fw-bold" th:text="${inv.movieName}"></div>
                <div class="small text-muted">
                  <i class="bi bi-calendar3 me-1"></i>
                  <span th:text="${#temporals.format(inv.scheduleShow,'dd/MM/yyyy')}"></span>
                  · <span class="text-danger fw-bold" th:text="${inv.scheduleShowTime}"></span>
                  · <span th:text="${inv.cinemaRoom}"></span>
                </div>
                <div class="small text-muted mt-1">
                  Ghế: <span class="fw-bold" th:text="${inv.seat}"></span>
                  · Mã: <span class="text-danger" th:text="${inv.bookingCode}"></span>
                </div>
              </div>
              <div class="text-end">
                                <span class="badge"
                                      th:classappend="${inv.invoiceStatus.name()=='WAITING'}
                                          ? 'bg-warning text-dark'
                                          : (${inv.invoiceStatus.name()=='CONFIRMED'}
                                              ? 'bg-success' : 'bg-secondary')"
                                      th:text="${inv.invoiceStatus.name()=='WAITING'} ? 'Chờ xác nhận'
                                          : (${inv.invoiceStatus.name()=='CONFIRMED'} ? 'Đã xác nhận' : 'Đã hủy')">
                                </span>
                <div class="fw-bold text-danger mt-1"
                     th:text="${#numbers.formatInteger(inv.totalMoney,1,'COMMA')} + 'đ'"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
