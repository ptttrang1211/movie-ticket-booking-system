<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Tài khoản của tôi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" th:href="@{/}">
      <i class="bi bi-camera-reels-fill text-danger me-1"></i>TRANGGDCinema
    </a>
    <div class="d-flex gap-2">
      <a th:href="@{/movies}" class="btn btn-sm btn-outline-light">Trang chủ</a>
      <form th:action="@{/logout}" method="post" class="d-inline">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-sm btn-outline-danger">Đăng xuất</button>
      </form>
    </div>
  </div>
</nav>

<div class="container py-4">
  <div class="row g-4">

    <!-- Sidebar -->
    <div class="col-md-3">
      <div class="card shadow-sm">
        <div class="card-body text-center py-4">
          <div class="bg-danger bg-opacity-10 rounded-circle d-inline-flex p-3 mb-2">
            <i class="bi bi-person-fill text-danger fs-2"></i>
          </div>
          <div class="fw-bold" th:text="${account.fullName}"></div>
          <div class="text-muted small" th:text="${account.userName}"></div>
          <div class="badge bg-warning text-dark mt-2" th:if="${member != null}">
            <i class="bi bi-star-fill me-1"></i>
            <span th:text="${member.score}"></span> điểm
          </div>
          <div class="badge bg-secondary mt-2" th:if="${member == null}"
               th:text="${account.role.roleName}"></div>
        </div>
        <div class="list-group list-group-flush">
          <a th:href="@{/account/info}"
             class="list-group-item list-group-item-action active">
            <i class="bi bi-person me-2"></i>Thông tin
          </a>
          <a th:if="${member != null}" th:href="@{/account/booked-ticket}"
             class="list-group-item list-group-item-action">
            <i class="bi bi-ticket me-2"></i>Lịch sử đặt vé
          </a>
          <a th:if="${member != null}" th:href="@{/account/score-history}"
             class="list-group-item list-group-item-action">
            <i class="bi bi-star me-2"></i>Lịch sử điểm
          </a>
        </div>
      </div>
    </div>

    <!-- Content -->
    <div class="col-md-9">

      <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
      <div th:if="${errorMsg}"   class="alert alert-danger"  th:text="${errorMsg}"></div>

      <!-- Thông tin cá nhân -->
      <div class="card shadow-sm mb-4">
        <div class="card-header fw-bold">Thông tin cá nhân</div>
        <div class="card-body">
          <form th:action="@{/account/update}" method="post"
                th:object="${updateRequest}">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Họ tên</label>
                <input type="text" th:field="*{fullName}" class="form-control"
                       th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'"/>
                <div class="invalid-feedback" th:errors="*{fullName}"></div>
              </div>
              <div class="col-md-6">
                <label class="form-label">Email</label>
                <input type="email" th:field="*{email}" class="form-control"
                       th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"/>
                <div class="invalid-feedback" th:errors="*{email}"></div>
              </div>
              <div class="col-md-6">
                <label class="form-label">Số điện thoại</label>
                <input type="text" th:field="*{phoneNumber}" class="form-control"/>
              </div>
              <div class="col-md-3">
                <label class="form-label">Ngày sinh</label>
                <input type="date" th:field="*{dateOfBirth}" class="form-control"/>
              </div>
              <div class="col-md-3">
                <label class="form-label">Giới tính</label>
                <select th:field="*{gender}" class="form-select">
                  <option value="Nam">Nam</option>
                  <option value="Nu">Nữ</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label">Địa chỉ</label>
                <input type="text" th:field="*{address}" class="form-control"/>
              </div>
            </div>
            <button type="submit" class="btn btn-danger mt-3">
              Lưu thay đổi
            </button>
          </form>
        </div>
      </div>

      <!-- Đổi mật khẩu -->
      <div class="card shadow-sm">
        <div class="card-header fw-bold">Đổi mật khẩu</div>
        <div class="card-body">
          <form th:action="@{/account/change-password}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="row g-3">
              <div class="col-md-4">
                <label class="form-label">Mật khẩu cũ</label>
                <input type="password" name="oldPassword" class="form-control" required/>
              </div>
              <div class="col-md-4">
                <label class="form-label">Mật khẩu mới</label>
                <input type="password" name="newPassword" class="form-control" required/>
              </div>
              <div class="col-md-4">
                <label class="form-label">Xác nhận</label>
                <input type="password" name="confirmPassword" class="form-control" required/>
              </div>
            </div>
            <button type="submit" class="btn btn-outline-danger mt-3">Đổi mật khẩu</button>
          </form>
        </div>
      </div>

    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
