<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Lịch sử điểm</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body>
<nav class="navbar navbar-dark bg-dark"><div class="container">
  <a class="navbar-brand fw-bold" th:href="@{/}"><i class="bi bi-camera-reels-fill text-danger me-1"></i>TRANGGDCinema</a>
</div></nav>

<div class="container py-4">
  <div class="row g-4">
    <div class="col-md-3">
      <div class="card shadow-sm">
        <div class="card-body text-center py-3">
          <div class="fw-bold fs-5 text-warning">
            <i class="bi bi-star-fill me-1"></i>
            <span th:text="${member.score}"></span>
          </div>
          <div class="text-muted small">Tổng điểm</div>
        </div>
        <div class="list-group list-group-flush">
          <a th:href="@{/account/info}"          class="list-group-item list-group-item-action"><i class="bi bi-person me-2"></i>Thông tin</a>
          <a th:href="@{/account/booked-ticket}" class="list-group-item list-group-item-action"><i class="bi bi-ticket me-2"></i>Lịch sử đặt vé</a>
          <a th:href="@{/account/score-history}" class="list-group-item list-group-item-action active"><i class="bi bi-star me-2"></i>Lịch sử điểm</a>
        </div>
      </div>
    </div>

    <div class="col-md-9">
      <h5 class="fw-bold mb-3">Lịch sử điểm</h5>
      <p class="text-muted small mb-3">Cộng 10% giá trị vé sau mỗi lần đặt thành công</p>

      <div th:if="${#lists.isEmpty(invoices)}"
           class="text-center py-5 text-muted border rounded">
        Chưa có lịch sử điểm.
      </div>

      <div class="card shadow-sm" th:unless="${#lists.isEmpty(invoices)}">
        <div class="card-body p-0">
          <table class="table table-hover mb-0">
            <thead class="table-dark">
            <tr>
              <th>Phim</th>
              <th>Ngày</th>
              <th class="text-success">+ Điểm cộng</th>
              <th class="text-danger">- Điểm dùng</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="inv : ${invoices}">
              <td class="align-middle small" th:text="${inv.movieName}"></td>
              <td class="align-middle small"
                  th:text="${#temporals.format(inv.bookingDate,'dd/MM/yyyy')}"></td>
              <td class="align-middle text-success fw-bold">
                                    <span th:if="${inv.addScore > 0}">
                                        +<span th:text="${inv.addScore}"></span>
                                    </span>
                <span th:unless="${inv.addScore > 0}" class="text-muted">—</span>
              </td>
              <td class="align-middle text-danger fw-bold">
                                    <span th:if="${inv.useScore > 0}">
                                        -<span th:text="${inv.useScore}"></span>
                                    </span>
                <span th:unless="${inv.useScore > 0}" class="text-muted">—</span>
              </td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
