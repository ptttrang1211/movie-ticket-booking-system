<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Quản lý phim - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body>

<!-- SIDEBAR LAYOUT -->
<div class="d-flex">

    <!-- Sidebar -->
    <div class="sidebar bg-dark text-white p-3" style="min-width:220px;min-height:100vh">
        <h5 class="fw-bold mb-4">
            <i class="bi bi-camera-reels-fill text-danger me-2"></i>Admin
        </h5>
        <ul class="nav flex-column gap-1">
            <li><a th:href="@{/admin/movie/list}"  class="nav-link text-white active"><i class="bi bi-film me-2"></i>Quản lý phim</a></li>
            <li><a th:href="@{/admin/showtime/list}" class="nav-link text-white"><i class="bi bi-calendar3 me-2"></i>Lịch chiếu</a></li>
            <li><a th:href="@{/admin/cinema-room}" class="nav-link text-white"><i class="bi bi-building me-2"></i>Phòng chiếu</a></li>
            <li><a th:href="@{/admin/branch}"      class="nav-link text-white"><i class="bi bi-geo-alt me-2"></i>Chi nhánh</a></li>
            <li><a th:href="@{/admin/employee/list}"    class="nav-link text-white"><i class="bi bi-people me-2"></i>Nhân viên</a></li>
            <li><a th:href="@{/admin/promotion/list}"   class="nav-link text-white"><i class="bi bi-tag me-2"></i>Khuyến mãi</a></li>
            <li class="mt-3">
                <a th:href="@{/home}" class="nav-link text-white-50">
                    <i class="bi bi-arrow-left me-2"></i>Về trang chủ
                </a>
            </li>
        </ul>
    </div>

    <!-- Content -->
    <div class="flex-grow-1 p-4">

        <!-- Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0">Quản lý phim</h4>
            <a th:href="@{/admin/movie/add}" class="btn btn-success">
                <i class="bi bi-plus-lg me-1"></i>Thêm phim
            </a>
        </div>

        <!-- Flash messages -->
        <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show">
            <span th:text="${successMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show">
            <span th:text="${errorMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Table -->
        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Poster</th>
                        <th>Tên phim</th>
                        <th>Thể loại</th>
                        <th>Thời lượng</th>
                        <th>Khởi chiếu</th>
                        <th>Kết thúc</th>
                        <th>Phiên bản</th>
                        <th>Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(movies)}">
                        <td colspan="9" class="text-center text-muted py-4">Chưa có phim nào</td>
                    </tr>
                    <tr th:each="movie, stat : ${movies}">
                        <td class="align-middle" th:text="${stat.index + 1}"></td>
                        <td class="align-middle">
                            <img th:if="${movie.smallImage}"
                                 th:src="${movie.smallImageSrc}"
                                 width="50" class="rounded" alt="poster"/>
                            <span th:unless="${movie.smallImage}" class="text-muted">—</span>
                        </td>
                        <td class="align-middle">
                            <div class="fw-bold"
                                 th:text="${movie.movieNameVn != null ? movie.movieNameVn : movie.movieNameEnglish}"></div>
                            <small class="text-muted" th:text="${movie.movieNameEnglish}"></small>
                        </td>
                        <td class="align-middle">
                                <span class="badge bg-secondary me-1"
                                      th:each="type : ${movie.types}"
                                      th:text="${type.typeName}"></span>
                        </td>
                        <td class="align-middle" th:text="${movie.duration} + ' phút'"></td>
                        <td class="align-middle"
                            th:text="${#temporals.format(movie.fromDate, 'dd/MM/yyyy')}"></td>
                        <td class="align-middle"
                            th:text="${#temporals.format(movie.toDate, 'dd/MM/yyyy')}"></td>
                        <td class="align-middle">
                            <span class="badge bg-primary" th:text="${movie.version}"></span>
                        </td>
                        <td class="align-middle">
                            <div class="d-flex gap-1">
                                <a th:href="@{/movies/{id}(id=${movie.movieId})}"
                                   class="btn btn-sm btn-outline-info" title="Xem">
                                    <i class="bi bi-eye"></i>
                                </a>
                                <a th:href="@{/admin/movie/edit/{id}(id=${movie.movieId})}"
                                   class="btn btn-sm btn-outline-warning" title="Sửa">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <form th:action="@{/admin/movie/delete/{id}(id=${movie.movieId})}"
                                      method="post"
                                      onsubmit="return confirm('Bạn có chắc muốn xóa phim này?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-sm btn-outline-danger" title="Xóa">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
