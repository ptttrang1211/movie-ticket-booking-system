<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
    <meta charset="UTF-8"/>
    <title th:text="${movie.movieNameVn != null ? movie.movieNameVn : movie.movieNameEnglish} + ' - TRANGGDCinema'"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="bi bi-camera-reels-fill text-danger me-1"></i>TRANGGDCinema
        </a>
        <div class="d-flex gap-2">
            <div sec:authorize="isAuthenticated()">
                <span class="nav-link text-white">
                    <i class="bi bi-person-circle"></i>
                    <span sec:authentication="name"></span>
                </span>
            </div>
            <div sec:authorize="!isAuthenticated()">
                <a th:href="@{/auth/login}" class="btn btn-sm btn-outline-light me-1">Đăng nhập</a>
                <a th:href="@{/auth/register}" class="btn btn-sm btn-danger">Đăng ký</a>
            </div>
        </div>
    </div>
</nav>

<!-- MAIN -->
<div class="container py-4">

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/movies}">Phim</a></li>
            <li class="breadcrumb-item active"
                th:text="${movie.movieNameVn != null ? movie.movieNameVn : movie.movieNameEnglish}"></li>
        </ol>
    </nav>

    <div class="row g-4">
        <!-- Poster -->
        <div class="col-md-3">
            <img th:if="${movie.largeImage}"
                 th:src="${movie.largeImageSrc}"
                 class="img-fluid rounded shadow" alt="poster"/>
            <img th:unless="${movie.largeImage}"
                 src="/images/no-poster.jpg"
                 class="img-fluid rounded shadow" alt="poster"/>

            <!-- Đặt vé button -->
            <a sec:authorize="hasRole('MEMBER')"
               th:href="@{/booking/select-branch(movieId=${movie.movieId})}"
               class="btn btn-danger w-100 mt-3 py-2 fw-bold">
                <i class="bi bi-ticket-perforated me-1"></i>Đặt vé ngay
            </a>
            <a sec:authorize="hasAnyRole('EMPLOYEE','ADMIN')"
               th:href="@{/showtimes(movieId=${movie.movieId})}"
               class="btn btn-outline-dark w-100 mt-3 py-2 fw-bold">
                <i class="bi bi-calendar-event me-1"></i>Xem lịch chiếu
            </a>
            <a sec:authorize="isAnonymous()"
               th:href="@{/booking/select-branch(movieId=${movie.movieId})}"
               class="btn btn-outline-danger w-100 mt-3 py-2 fw-bold">
                <i class="bi bi-ticket-perforated me-1"></i>Đặt vé ngay
            </a>
        </div>

        <!-- Info -->
        <div class="col-md-9">
            <h2 class="fw-bold mb-1"
                th:text="${movie.movieNameVn != null ? movie.movieNameVn : movie.movieNameEnglish}"></h2>
            <p class="text-muted mb-3" th:text="${movie.movieNameEnglish}"></p>

            <!-- Thể loại + version -->
            <div class="mb-3">
                <span class="badge bg-danger me-1" th:text="${movie.version}"></span>
                <span class="badge bg-secondary me-1"
                      th:each="type : ${movie.types}"
                      th:text="${type.typeName}"></span>
            </div>

            <!-- Thông tin cơ bản -->
            <table class="table table-borderless table-sm w-auto mb-3">
                <tr>
                    <td class="text-muted pe-3">Thời lượng</td>
                    <td th:text="${movie.duration} + ' phút'"></td>
                </tr>
                <tr>
                    <td class="text-muted pe-3">Đạo diễn</td>
                    <td th:text="${movie.director}"></td>
                </tr>
                <tr>
                    <td class="text-muted pe-3">Diễn viên</td>
                    <td th:text="${movie.actor}"></td>
                </tr>
                <tr>
                    <td class="text-muted pe-3">Hãng sản xuất</td>
                    <td th:text="${movie.movieProductionCompany}"></td>
                </tr>
                <tr>
                    <td class="text-muted pe-3">Khởi chiếu</td>
                    <td th:text="${#temporals.format(movie.fromDate, 'dd/MM/yyyy')}"></td>
                </tr>
                <tr>
                    <td class="text-muted pe-3">Kết thúc</td>
                    <td th:text="${#temporals.format(movie.toDate, 'dd/MM/yyyy')}"></td>
                </tr>
            </table>

            <!-- Nội dung phim -->
            <div th:if="${movie.content != null and !#strings.isEmpty(movie.content)}">
                <h6 class="fw-bold mb-2">Nội dung phim</h6>
                <p class="text-muted" th:text="${movie.content}"></p>
            </div>

            <div th:if="${(movie.trailer != null and !#strings.isEmpty(movie.trailer)) or (movie.reviewLink != null and !#strings.isEmpty(movie.reviewLink))}"
                 class="mt-3">
                <h6 class="fw-bold mb-2">Khám phá thêm</h6>
                <div class="d-flex gap-2 flex-wrap">
                    <a th:if="${movie.trailer != null and !#strings.isEmpty(movie.trailer)}"
                       th:href="${movie.trailer}" target="_blank" rel="noopener noreferrer"
                       class="btn btn-outline-danger btn-sm">
                        <i class="bi bi-play-circle me-1"></i>Xem trailer
                    </a>
                    <a th:if="${movie.reviewLink != null and !#strings.isEmpty(movie.reviewLink)}"
                       th:href="${movie.reviewLink}" target="_blank" rel="noopener noreferrer"
                       class="btn btn-outline-secondary btn-sm">
                        <i class="bi bi-chat-square-text me-1"></i>Xem review
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-white text-center py-3 mt-5">
    <small>&copy; 2025 TRANGGDCinema. All rights reserved.</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
