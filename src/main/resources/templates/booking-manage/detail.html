<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>Chi tiết đặt vé</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body>
<div class="d-flex">
  <div class="sidebar bg-dark text-white p-3" style="min-width:200px;min-height:100vh">
    <h5 class="fw-bold mb-4"><i class="bi bi-camera-reels-fill text-danger me-2"></i>Employee</h5>
    <ul class="nav flex-column gap-1">
      <li><a th:href="@{/ticket/select-movie}" class="nav-link text-white"><i class="bi bi-ticket me-2"></i>Bán vé</a></li>
      <li><a th:href="@{/booking-manage/list}"  class="nav-link text-white active"><i class="bi bi-check2-square me-2"></i>Xác nhận vé</a></li>
    </ul>
  </div>

  <div class="flex-grow-1 p-4" style="max-width:700px">
    <div class="d-flex align-items-center gap-2 mb-4">
      <a th:href="@{/booking-manage/list}" class="btn btn-sm btn-outline-secondary">
        <i class="bi bi-arrow-left"></i>
      </a>
      <h4 class="fw-bold mb-0">Chi tiết đặt vé</h4>
    </div>

    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
    <div th:if="${errorMsg}"   class="alert alert-danger"  th:text="${errorMsg}"></div>

    <div class="card shadow-sm mb-3">
      <div class="card-body">

        <!-- Booking code + status -->
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div>
            <div class="text-muted small">Mã đặt vé</div>
            <div class="fw-bold fs-4 text-danger"
                 th:text="${invoice.bookingCode}"></div>
          </div>
          <span class="badge fs-6"
                th:classappend="${invoice.invoiceStatus.name()=='WAITING'}
                              ? 'bg-warning text-dark'
                              : (${invoice.invoiceStatus.name()=='CONFIRMED'}
                                  ? 'bg-success' : 'bg-secondary')"
                th:text="${invoice.invoiceStatus.name()=='WAITING'} ? 'Chờ xác nhận'
                              : (${invoice.invoiceStatus.name()=='CONFIRMED'} ? 'Đã xác nhận' : 'Đã hủy')">
                    </span>
        </div>

        <!-- Info -->
        <table class="table table-sm table-borderless">
          <tr>
            <td class="text-muted" width="140">Phim</td>
            <td class="fw-bold" th:text="${invoice.movieName}"></td>
          </tr>
          <tr>
            <td class="text-muted">Phòng chiếu</td>
            <td th:text="${invoice.cinemaRoom}"></td>
          </tr>
          <tr>
            <td class="text-muted">Ngày chiếu</td>
            <td th:text="${#temporals.format(invoice.scheduleShow,'dd/MM/yyyy')}"></td>
          </tr>
          <tr>
            <td class="text-muted">Giờ chiếu</td>
            <td class="fw-bold text-danger" th:text="${invoice.scheduleShowTime}"></td>
          </tr>
          <tr>
            <td class="text-muted">Ghế</td>
            <td class="fw-bold" th:text="${invoice.seat}"></td>
          </tr>
          <tr>
            <td class="text-muted">Ngày đặt</td>
            <td th:text="${#temporals.format(invoice.bookingDate,'HH:mm dd/MM/yyyy')}"></td>
          </tr>
          <tr th:if="${invoice.account != null}">
            <td class="text-muted">Khách hàng</td>
            <td>
              <span th:text="${invoice.account.fullName}"></span>
              <small class="text-muted ms-2"
                     th:text="${invoice.account.phoneNumber}"></small>
            </td>
          </tr>
          <tr th:if="${invoice.handledBy != null}">
            <td class="text-muted">Nhân viên xử lý</td>
            <td>
              <span th:text="${invoice.handledBy.fullName != null ? invoice.handledBy.fullName : invoice.handledBy.userName}"></span>
              <small class="text-muted ms-2"
                     th:text="${invoice.handledBy.userName}"></small>
            </td>
          </tr>
        </table>

        <!-- Line items -->
        <div class="border-top pt-3 mt-2">
          <div class="fw-semibold mb-2">Chi tiết vé:</div>
          <div th:each="ticket : ${tickets}"
               class="d-flex justify-content-between small py-1 border-bottom">
                        <span>
                            Ghế <span th:text="${ticket.scheduleSeat.seat.seatRow}"></span>
                            <span th:text="${ticket.scheduleSeat.seat.seatColumn}"></span>
                            <span class="badge ms-1"
                                  th:classappend="${ticket.ticketType.name()=='VIP'}
                                      ? 'bg-warning text-dark' : 'bg-secondary'"
                                  th:text="${ticket.ticketType.name()}"></span>
                        </span>
            <span th:text="${#numbers.formatInteger(ticket.price,1,'COMMA')} + 'đ'"></span>
          </div>
          <div class="d-flex justify-content-between fw-bold mt-2">
            <span>Tổng tiền</span>
            <span class="text-danger"
                  th:text="${#numbers.formatInteger(invoice.totalMoney,1,'COMMA')} + 'đ'"></span>
          </div>
        </div>

      </div>
    </div>

    <!-- Actions -->
    <div class="d-flex gap-2"
         th:if="${invoice.invoiceStatus.name()=='WAITING'}">
      <form th:action="@{/booking-manage/confirm/{id}(id=${invoice.invoiceId})}"
            method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-success px-4">
          <i class="bi bi-check-lg me-1"></i>Xác nhận và in vé
        </button>
      </form>
      <form th:action="@{/booking-manage/cancel/{id}(id=${invoice.invoiceId})}"
            method="post"
            onsubmit="return confirm('Hủy vé này?')">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <button type="submit" class="btn btn-outline-danger px-4">
          <i class="bi bi-x-lg me-1"></i>Hủy vé
        </button>
      </form>
    </div>

    <div class="d-flex gap-2"
         th:if="${invoice.invoiceStatus.name()=='CONFIRMED'}">
      <a th:href="@{/booking-manage/receipt/{id}(id=${invoice.invoiceId})}"
         class="btn btn-success px-4">
        <i class="bi bi-printer me-1"></i>In vé cho khách
      </a>
      <a th:href="@{/booking-manage/list}"
         class="btn btn-outline-secondary px-4">
        <i class="bi bi-list-ul me-1"></i>Về danh sách
      </a>
    </div>

  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
