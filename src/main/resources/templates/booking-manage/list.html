<!-- ==================== booking-manage/list.html ==================== -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Quản lý đặt vé</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body>
<div class="d-flex">
    <div class="sidebar bg-dark text-white p-3" style="min-width:200px;min-height:100vh">
        <h5 class="fw-bold mb-4"><i class="bi bi-camera-reels-fill text-danger me-2"></i>Employee</h5>
        <ul class="nav flex-column gap-1">
            <li><a th:href="@{/ticket/select-movie}" class="nav-link text-white"><i class="bi bi-ticket me-2"></i>Bán vé</a></li>
            <li><a th:href="@{/booking-manage/list}"  class="nav-link text-white active"><i class="bi bi-check2-square me-2"></i>Xác nhận vé</a></li>
        </ul>
    </div>

    <div class="flex-grow-1 p-4">
        <h4 class="fw-bold mb-4">Quản lý đặt vé</h4>

        <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show">
            <span th:text="${successMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Search -->
        <form th:action="@{/booking-manage/list}" method="get" class="mb-3">
            <div class="input-group" style="max-width:400px">
                <input type="text" name="keyword" class="form-control"
                       placeholder="Mã đặt vé / SĐT / CMND"
                       th:value="${keyword}"/>
                <button class="btn btn-outline-secondary" type="submit">
                    <i class="bi bi-search"></i>
                </button>
                <a th:href="@{/booking-manage/list}" class="btn btn-outline-danger">
                    <i class="bi bi-x"></i>
                </a>
            </div>
        </form>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th>Mã đặt vé</th>
                        <th>Phim</th>
                        <th>Ngày chiếu</th>
                        <th>Giờ</th>
                        <th>Ghế</th>
                        <th>Tổng tiền</th>
                        <th>Trạng thái</th>
                        <th>Nhân viên xử lý</th>
                        <th>Ngày đặt</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(invoices)}">
                        <td colspan="10" class="text-center text-muted py-4">Không có dữ liệu</td>
                    </tr>
                    <tr th:each="inv : ${invoices}">
                        <td class="align-middle">
                            <span class="fw-bold text-danger" th:text="${inv.bookingCode}"></span>
                        </td>
                        <td class="align-middle small" th:text="${inv.movieName}"></td>
                        <td class="align-middle small"
                            th:text="${#temporals.format(inv.scheduleShow,'dd/MM/yyyy')}"></td>
                        <td class="align-middle">
                            <span class="badge bg-danger" th:text="${inv.scheduleShowTime}"></span>
                        </td>
                        <td class="align-middle small" th:text="${inv.seat}"></td>
                        <td class="align-middle small"
                            th:text="${#numbers.formatInteger(inv.totalMoney,1,'COMMA')} + 'đ'"></td>
                        <td class="align-middle">
                                <span class="badge"
                                      th:classappend="${inv.invoiceStatus.name()=='WAITING'}
                                          ? 'bg-warning text-dark'
                                          : (${inv.invoiceStatus.name()=='CONFIRMED'}
                                              ? 'bg-success' : 'bg-secondary')"
                                      th:text="${inv.invoiceStatus.name()=='WAITING'} ? 'Chờ xác nhận'
                                          : (${inv.invoiceStatus.name()=='CONFIRMED'} ? 'Đã xác nhận' : 'Đã hủy')">
                                </span>
                        </td>
                        <td class="align-middle small">
                            <span th:if="${inv.handledBy != null}"
                                  th:text="${inv.handledBy.fullName != null ? inv.handledBy.fullName : inv.handledBy.userName}"></span>
                            <span th:unless="${inv.handledBy != null}" class="text-muted">—</span>
                        </td>
                        <td class="align-middle small"
                            th:text="${#temporals.format(inv.bookingDate,'HH:mm dd/MM')}"></td>
                        <td class="align-middle">
                            <div class="d-flex gap-2">
                                <a th:href="@{/booking-manage/detail/{id}(id=${inv.invoiceId})}"
                                   class="btn btn-sm btn-outline-primary">
                                    Chi tiết
                                </a>
                                <a th:if="${inv.invoiceStatus.name()=='CONFIRMED'}"
                                   th:href="@{/booking-manage/receipt/{id}(id=${inv.invoiceId})}"
                                   class="btn btn-sm btn-outline-success">
                                    In vé
                                </a>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
