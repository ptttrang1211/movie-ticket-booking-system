<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <title>In vé booking online - TRANGGDCinema</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    .receipt-card{border:2px dashed #0d6efd;border-radius:16px;max-width:520px;margin:0 auto}
    .ticket-divider{border-top:2px dashed #dee2e6;margin:16px -1px}
    @media print{.no-print{display:none!important}}
  </style>
</head>
<body>

<div class="container py-4">

  <div class="text-center mb-4 no-print">
    <div class="bg-primary bg-opacity-10 rounded-circle d-inline-flex p-3 mb-3">
      <i class="bi bi-printer-fill text-primary fs-1"></i>
    </div>
    <h4 class="fw-bold">Booking online đã được xác nhận</h4>
    <p class="text-muted mb-0">Nhân viên có thể in hoặc giao vé cho khách tại quầy.</p>
  </div>

  <div class="receipt-card p-4 shadow-sm">

    <div class="text-center mb-3">
      <div class="fw-bold text-primary fs-5 mb-1">TRANGGDCinema</div>
      <span class="badge bg-success px-3 py-2">ĐÃ XÁC NHẬN</span>
    </div>

    <div class="text-center bg-light rounded p-3 mb-3">
      <div class="text-muted small mb-1">Mã đặt vé</div>
      <div class="fw-bold fs-3 text-primary"
           th:text="${invoice.bookingCode}"></div>
    </div>

    <div class="ticket-divider"></div>

    <div class="mb-3">
      <div class="fw-bold fs-5 mb-2" th:text="${invoice.movieName}"></div>
      <div class="row g-2 small text-muted">
        <div class="col-6">
          <i class="bi bi-building me-1"></i>
          <span th:text="${invoice.cinemaRoom}"></span>
        </div>
        <div class="col-6">
          <i class="bi bi-calendar3 me-1"></i>
          <span th:text="${#temporals.format(invoice.scheduleShow, 'dd/MM/yyyy')}"></span>
        </div>
        <div class="col-6">
          <i class="bi bi-clock me-1"></i>
          <span class="text-primary fw-bold" th:text="${invoice.scheduleShowTime}"></span>
        </div>
        <div class="col-6">
          <i class="bi bi-grid me-1"></i>
          Ghế: <span class="fw-bold" th:text="${invoice.seat}"></span>
        </div>
      </div>
    </div>

    <div class="ticket-divider"></div>

    <div class="mb-3">
      <div class="fw-semibold mb-2">Chi tiết vé:</div>
      <div th:each="ticket : ${tickets}"
           class="d-flex justify-content-between small py-1 border-bottom">
        <span>
          Ghế <span th:text="${ticket.scheduleSeat.seat.seatRow}"></span>
          <span th:text="${ticket.scheduleSeat.seat.seatColumn}"></span>
          <span class="badge ms-1"
                th:classappend="${ticket.ticketType.name() == 'VIP'} ? 'bg-warning text-dark' : 'bg-secondary'"
                th:text="${ticket.ticketType.name()}"></span>
        </span>
        <span th:text="${#numbers.formatInteger(ticket.price, 1, 'COMMA')} + 'đ'"></span>
      </div>
    </div>

    <div class="d-flex justify-content-between fw-bold border-top pt-2">
      <span>Tổng tiền</span>
      <span class="text-primary"
            th:text="${#numbers.formatInteger(invoice.totalMoney, 1, 'COMMA')} + 'đ'"></span>
    </div>

    <div th:if="${invoice.account != null}" class="mt-3 small">
      <div class="text-muted">Khách hàng</div>
      <div class="fw-semibold">
        <span th:text="${invoice.account.fullName != null ? invoice.account.fullName : invoice.account.userName}"></span>
        <span class="text-muted ms-2" th:text="${invoice.account.phoneNumber}"></span>
      </div>
    </div>

    <div th:if="${invoice.handledBy != null}" class="mt-2 small">
      <div class="text-muted">Nhân viên xác nhận</div>
      <div class="fw-semibold"
           th:text="${invoice.handledBy.fullName != null ? invoice.handledBy.fullName : invoice.handledBy.userName}"></div>
    </div>

    <div class="ticket-divider"></div>

    <div class="text-center text-muted small">
      <span th:text="${#temporals.format(invoice.bookingDate, 'HH:mm dd/MM/yyyy')}"></span>
    </div>
  </div>

  <div class="text-center mt-4 d-flex justify-content-center gap-3 no-print">
    <button onclick="window.print()" class="btn btn-outline-secondary">
      <i class="bi bi-printer me-1"></i>In vé
    </button>
    <a th:href="@{/booking-manage/detail/{id}(id=${invoice.invoiceId})}" class="btn btn-outline-primary">
      <i class="bi bi-arrow-left me-1"></i>Quay lại chi tiết
    </a>
    <a th:href="@{/booking-manage/list}" class="btn btn-primary">
      <i class="bi bi-list-ul me-1"></i>Danh sách booking
    </a>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
