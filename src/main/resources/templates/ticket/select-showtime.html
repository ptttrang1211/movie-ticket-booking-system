<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Bán vé - Chọn suất chiếu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body>
<div class="d-flex">

    <div class="sidebar bg-dark text-white p-3" style="min-width:200px;min-height:100vh">
        <h5 class="fw-bold mb-4"><i class="bi bi-camera-reels-fill text-danger me-2"></i>Employee</h5>
        <ul class="nav flex-column gap-1">
            <li><a th:href="@{/ticket/select-movie}" class="nav-link text-white active"><i class="bi bi-ticket me-2"></i>Bán vé</a></li>
            <li><a th:href="@{/home}" class="nav-link text-white"><i class="bi bi-house me-2"></i>Trang chủ</a></li>
        </ul>
    </div>

    <div class="flex-grow-1 p-4" style="max-width:760px">
        <div class="d-flex align-items-center gap-2 mb-4">
            <a th:href="@{/ticket/select-movie}" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-arrow-left"></i>
            </a>
            <h4 class="fw-bold mb-0">Chọn suất chiếu</h4>
        </div>

        <div class="d-flex align-items-center gap-2 mb-4" style="max-width:500px">
            <span class="badge bg-success rounded-pill px-3 py-2">1. Phim ✓</span>
            <div class="flex-grow-1 border-top"></div>
            <span class="badge bg-danger rounded-pill px-3 py-2">2. Suất chiếu</span>
            <div class="flex-grow-1 border-top"></div>
            <span class="badge bg-secondary rounded-pill px-3 py-2">3. Chọn ghế</span>
        </div>

        <div class="d-flex gap-3 align-items-center mb-4 p-3 bg-light rounded">
            <img th:if="${movie.smallImage}"
                 th:src="${movie.smallImageSrc}"
                 height="60" class="rounded"/>
            <div>
                <h6 class="fw-bold mb-0"
                    th:text="${movie.movieNameVn != null ? movie.movieNameVn : movie.movieNameEnglish}"></h6>
                <small class="text-muted">
                    <i class="bi bi-geo-alt me-1"></i>
                    <span th:text="${branch.branchName}"></span>
                </small>
            </div>
        </div>

        <h5 class="fw-bold mb-3">Chọn ngày</h5>
        <div class="d-flex gap-2 flex-wrap mb-4">
            <a th:each="d : ${dateRange}"
               th:href="@{/ticket/select-showtime(movieId=${movieId},branchId=${branchId},date=${d})}"
               th:classappend="${d == selectedDate} ? ' active'"
               class="btn btn-outline-secondary date-btn">
                <div class="fw-bold" th:text="${#temporals.format(d, 'dd')}"></div>
                <div class="small"
                     th:text="${#temporals.format(d, 'EEE', new java.util.Locale('vi'))}"></div>
            </a>
        </div>

        <h5 class="fw-bold mb-3">Chọn suất chiếu</h5>
        <div th:if="${#lists.isEmpty(showtimes)}"
             class="text-center py-5 text-muted border rounded">
            Không có suất chiếu nào trong ngày này.
        </div>
        <div class="d-flex flex-wrap gap-3" th:unless="${#lists.isEmpty(showtimes)}">
            <a th:each="st : ${showtimes}"
               th:href="@{/ticket/select-seat(showtimeId=${st.showTimeId})}"
               class="btn btn-outline-danger showtime-btn py-3 px-4">
                <div class="fw-bold fs-5" th:text="${st.showTime}"></div>
                <div class="small text-muted" th:text="${st.cinemaRoom.cinemaRoomName}"></div>
            </a>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<style>
    .date-btn{min-width:56px;text-align:center}
    .date-btn.active{background:#dc3545;border-color:#dc3545;color:white}
    .showtime-btn{min-width:100px;text-align:center}
</style>
</body>
</html>
