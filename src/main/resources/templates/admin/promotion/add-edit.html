<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Thêm/Sửa khuyến mãi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div class="d-flex">
    <div class="sidebar bg-dark text-white p-3" style="min-width:220px;min-height:100vh">
        <h5 class="fw-bold mb-4"><i class="bi bi-camera-reels-fill text-danger me-2"></i>Admin</h5>
    </div>
    <div class="flex-grow-1 p-4" style="max-width:600px">
        <div class="d-flex align-items-center gap-2 mb-4">
            <a th:href="@{/admin/promotion/list}" class="btn btn-sm btn-outline-secondary">←</a>
            <h4 class="fw-bold mb-0">Khuyến mãi</h4>
        </div>
        <div class="card shadow-sm">
            <div class="card-body">
                <!-- Dùng chung cho add và edit, action khác nhau qua controller -->
                <form th:action="${promotion.promotionId != null}
                          ? @{/admin/promotion/edit/{id}(id=${promotion.promotionId})}
                          : @{/admin/promotion/add}"
                      method="post" th:object="${promotion}"
                      enctype="multipart/form-data">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" th:field="*{image}"/>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Tiêu đề <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{title}" class="form-control" required/>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Mô tả</label>
                        <textarea th:field="*{detail}" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Giảm giá (VNĐ)</label>
                            <input type="number" th:field="*{discountLevel}" class="form-control"/>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Bắt đầu</label>
                            <input type="datetime-local" th:field="*{startTime}" class="form-control"/>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold">Kết thúc</label>
                            <input type="datetime-local" th:field="*{endTime}" class="form-control"/>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Ảnh banner</label>
                        <input type="file" name="imageFile" class="form-control" accept="image/*"/>
                        <div class="mt-2" th:if="${promotion.image}">
                            <img th:src="@{/uploads/{img}(img=${promotion.image})}"
                                 alt="Banner hiện tại"
                                 class="img-fluid rounded border"
                                 style="max-height: 180px; object-fit: cover;"/>
                        </div>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success px-4">Lưu</button>
                        <a th:href="@{/admin/promotion/list}" class="btn btn-outline-secondary px-4">Hủy</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
