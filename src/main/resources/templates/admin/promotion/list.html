<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Quản lý khuyến mãi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body>
<div class="d-flex">
    <div class="sidebar bg-dark text-white p-3" style="min-width:220px;min-height:100vh">
        <h5 class="fw-bold mb-4"><i class="bi bi-camera-reels-fill text-danger me-2"></i>Admin</h5>
        <ul class="nav flex-column gap-1">
            <li><a th:href="@{/admin/movie/list}"    class="nav-link text-white"><i class="bi bi-film me-2"></i>Phim</a></li>
            <li><a th:href="@{/admin/showtime/list}" class="nav-link text-white"><i class="bi bi-calendar3 me-2"></i>Lịch chiếu</a></li>
            <li><a th:href="@{/admin/employee/list}" class="nav-link text-white"><i class="bi bi-people me-2"></i>Nhân viên</a></li>
            <li><a th:href="@{/admin/promotion/list}" class="nav-link text-white active"><i class="bi bi-tag me-2"></i>Khuyến mãi</a></li>
        </ul>
    </div>
    <div class="flex-grow-1 p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0">Quản lý khuyến mãi</h4>
            <a th:href="@{/admin/promotion/add}" class="btn btn-success"><i class="bi bi-plus-lg me-1"></i>Thêm KM</a>
        </div>
        <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show">
            <span th:text="${successMsg}"></span><button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                    <tr><th>Tiêu đề</th><th>Mô tả</th><th>Giảm giá</th><th>Bắt đầu</th><th>Kết thúc</th><th>Trạng thái</th><th></th></tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(promotions)}">
                        <td colspan="7" class="text-center text-muted py-4">Chưa có khuyến mãi</td>
                    </tr>
                    <tr th:each="p : ${promotions}">
                        <td class="align-middle fw-bold small" th:text="${p.title}"></td>
                        <td class="align-middle small" th:text="${p.detail}"></td>
                        <td class="align-middle text-danger fw-bold"
                            th:text="${#numbers.formatInteger(p.discountLevel,1,'COMMA')} + 'đ'"></td>
                        <td class="align-middle small"
                            th:text="${#temporals.format(p.startTime,'dd/MM/yyyy')}"></td>
                        <td class="align-middle small"
                            th:text="${#temporals.format(p.endTime,'dd/MM/yyyy')}"></td>
                        <td class="align-middle">
                                <span th:classappend="${p.valid} ? 'bg-success' : 'bg-secondary'"
                                      class="badge"
                                      th:text="${p.valid} ? 'Còn hiệu lực' : 'Hết hạn'"></span>
                        </td>
                        <td class="align-middle">
                            <div class="d-flex gap-1">
                                <a th:href="@{/admin/promotion/edit/{id}(id=${p.promotionId})}"
                                   class="btn btn-sm btn-outline-warning"><i class="bi bi-pencil"></i></a>
                                <form th:action="@{/admin/promotion/delete/{id}(id=${p.promotionId})}"
                                      method="post" onsubmit="return confirm('Xóa?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-sm btn-outline-danger">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
