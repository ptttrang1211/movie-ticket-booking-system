<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Quản lý lịch chiếu - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body>
<div class="d-flex">

    <!-- Sidebar -->
    <div class="sidebar bg-dark text-white p-3" style="min-width:220px;min-height:100vh">
        <h5 class="fw-bold mb-4"><i class="bi bi-camera-reels-fill text-danger me-2"></i>Admin</h5>
        <ul class="nav flex-column gap-1">
            <li><a th:href="@{/admin/movie/list}"    class="nav-link text-white"><i class="bi bi-film me-2"></i>Quản lý phim</a></li>
            <li><a th:href="@{/admin/showtime/list}" class="nav-link text-white active"><i class="bi bi-calendar3 me-2"></i>Lịch chiếu</a></li>
            <li><a th:href="@{/admin/cinema-room}"   class="nav-link text-white"><i class="bi bi-building me-2"></i>Phòng chiếu</a></li>
            <li><a th:href="@{/admin/branch}"        class="nav-link text-white"><i class="bi bi-geo-alt me-2"></i>Chi nhánh</a></li>
            <li><a th:href="@{/admin/employee/list}"      class="nav-link text-white"><i class="bi bi-people me-2"></i>Nhân viên</a></li>
            <li><a th:href="@{/admin/promotion/list}"     class="nav-link text-white"><i class="bi bi-tag me-2"></i>Khuyến mãi</a></li>
        </ul>
    </div>

    <!-- Content -->
    <div class="flex-grow-1 p-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0">Quản lý lịch chiếu</h4>
            <a th:href="@{/admin/showtime/add}" class="btn btn-success">
                <i class="bi bi-plus-lg me-1"></i>Thêm suất chiếu
            </a>
        </div>

        <!-- Flash -->
        <div th:if="${successMsg}" class="alert alert-success alert-dismissible fade show">
            <span th:text="${successMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${errorMsg}" class="alert alert-danger alert-dismissible fade show">
            <span th:text="${errorMsg}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Filter ngày -->
        <form th:action="@{/admin/showtime/list}" method="get" class="mb-3">
            <div class="d-flex gap-2 align-items-center">
                <label class="fw-semibold me-1">Ngày chiếu:</label>
                <input type="date" name="date" class="form-control" style="width:auto"
                       th:value="${#temporals.format(selectedDate, 'yyyy-MM-dd')}"
                       onchange="this.form.submit()"/>
            </div>
        </form>

        <!-- Table -->
        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Phim</th>
                        <th>Chi nhánh</th>
                        <th>Phòng chiếu</th>
                        <th>Ngày chiếu</th>
                        <th>Giờ chiếu</th>
                        <th>Số ghế</th>
                        <th>Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(showtime)}">
                        <td colspan="8" class="text-center text-muted py-4">
                            Không có suất chiếu nào ngày này
                        </td>
                    </tr>
                    <tr th:each="st, stat : ${showtime}">
                        <td class="align-middle" th:text="${stat.index + 1}"></td>
                        <td class="align-middle">
                            <div class="fw-bold small"
                                 th:text="${st.movie != null
                                         ? st.movie.movieNameVn
                                         : st.movie.movieNameEnglish}"></div>
                        </td>
                        <td class="align-middle small"
                        th:text="${st.cinemaRoom.branch.branchName}"></td>
                        <td class="align-middle small"
                            th:text="${st.cinemaRoom.cinemaRoomName}"></td>
                        <td class="align-middle"
                            th:text="${#temporals.format(st.showDate, 'dd/MM/yyyy')}"></td>
                        <td class="align-middle">
                                <span class="badge bg-danger fs-6"
                                      th:text="${st.showTime}"></span>
                        </td>
                        <td class="align-middle" th:text="${st.cinemaRoom.seatQuantity}"></td>
                        <td class="align-middle">
                            <div class="d-flex gap-1">
                                <a th:href="@{/admin/showtime/edit/{id}(id=${st.showTimeId})}"
                                   class="btn btn-sm btn-outline-warning">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <form th:action="@{/admin/showtime/delete/{id}(id=${st.showTimeId})}"
                                      method="post"
                                      onsubmit="return confirm('Xóa suất chiếu này?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-sm btn-outline-danger">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
