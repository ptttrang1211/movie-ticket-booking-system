<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Sửa suất chiếu - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>

</head>
<body>
<div class="d-flex">

    <div class="sidebar bg-dark text-white p-3" style="min-width:220px;min-height:100vh">
        <h5 class="fw-bold mb-4"><i class="bi bi-camera-reels-fill text-danger me-2"></i>Admin</h5>
        <ul class="nav flex-column gap-1">
            <li><a th:href="@{/admin/movie/list}"    class="nav-link text-white"><i class="bi bi-film me-2"></i>Quản lý phim</a></li>
            <li><a th:href="@{/admin/showtime/list}" class="nav-link text-white active"><i class="bi bi-calendar3 me-2"></i>Lịch chiếu</a></li>
            <li><a th:href="@{/admin/employee/list}"      class="nav-link text-white"><i class="bi bi-people me-2"></i>Nhân viên</a></li>
        </ul>
    </div>

    <div class="flex-grow-1 p-4" style="max-width:600px">
        <div class="d-flex align-items-center gap-2 mb-4">
            <a th:href="@{/admin/showtime/list}" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-arrow-left"></i>
            </a>
            <h4 class="fw-bold mb-0">Sửa suất chiếu</h4>
        </div>

        <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

        <div class="card shadow-sm">
            <div class="card-body">
                <form th:action="@{/admin/showtime/edit/{id}(id=${showtime.showTimeId})}"
                      method="post" th:object="${showtimeRequest}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Phim <span class="text-danger">*</span></label>
                        <select th:field="*{movieId}" class="form-select">
                            <option value="">-- Chọn phim --</option>
                            <option th:each="movie : ${movies}"
                                    th:value="${movie.movieId}"
                                    th:text="${movie.movieNameVn != null ? movie.movieNameVn : movie.movieNameEnglish}"></option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Phòng chiếu <span class="text-danger">*</span></label>
                        <select th:field="*{cinemaRoomId}" class="form-select">
                            <option value="">-- Chọn phòng --</option>
                            <option th:each="room : ${cinemaRooms}"
                                    th:value="${room.cinemaRoomId}"
                                    th:text="${room.branch.branchName + ' - ' + room.cinemaRoomName}"></option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Ngày chiếu <span class="text-danger">*</span></label>
                        <input type="date" th:field="*{showDate}" class="form-control"/>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Giờ chiếu <span class="text-danger">*</span></label>
                        <select th:field="*{showTime}" class="form-select">
                            <option value="">-- Chọn giờ --</option>
                            <option th:each="t : ${ {'08:00','09:00','10:00','11:00','13:30','14:30','15:00','17:00','18:30','19:00','20:00','21:00'} }"
                                    th:value="${t}" th:text="${t}"></option>
                        </select>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-warning px-4">
                            <i class="bi bi-check-lg me-1"></i>Cập nhật
                        </button>
                        <a th:href="@{/admin/showtime/list}" class="btn btn-outline-secondary px-4">Hủy</a>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
