<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Thêm phòng chiếu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body>
<div class="d-flex">
    <div class="sidebar bg-dark text-white p-3" style="min-width:220px;min-height:100vh">
        <h5 class="fw-bold mb-4"><i class="bi bi-camera-reels-fill text-danger me-2"></i>Admin</h5>
        <ul class="nav flex-column gap-1">
            <li><a th:href="@{/admin/movie/list}" class="nav-link text-white"><i class="bi bi-film me-2"></i>Phim</a></li>
            <li><a th:href="@{/admin/showtime/list}" class="nav-link text-white"><i class="bi bi-calendar3 me-2"></i>Lịch chiếu</a></li>
            <li><a th:href="@{/admin/cinema-room}" class="nav-link text-white active"><i class="bi bi-building me-2"></i>Phòng chiếu</a></li>
            <li><a th:href="@{/admin/employee/list}" class="nav-link text-white"><i class="bi bi-people me-2"></i>Nhân viên</a></li>
        </ul>
    </div>

    <div class="flex-grow-1 p-4" style="max-width:720px">
        <div class="d-flex align-items-center gap-2 mb-4">
            <a th:href="@{/admin/cinema-room}" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-arrow-left"></i>
            </a>
            <h4 class="fw-bold mb-0">Thêm phòng chiếu</h4>
        </div>

        <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

        <div class="card shadow-sm">
            <div class="card-body">
                <form th:action="@{/admin/cinema-room/add}" method="post" th:object="${cinemaRoomRequest}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Chi nhánh <span class="text-danger">*</span></label>
                        <select th:field="*{branchId}" class="form-select"
                                th:classappend="${#fields.hasErrors('branchId')} ? 'is-invalid'">
                            <option value="">-- Chọn chi nhánh --</option>
                            <option th:each="branch : ${branches}"
                                    th:value="${branch.branchId}"
                                    th:text="${branch.branchName}"></option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{branchId}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Tên phòng <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{cinemaRoomName}" class="form-control"
                               placeholder="Ví dụ: Room 1"
                               th:classappend="${#fields.hasErrors('cinemaRoomName')} ? 'is-invalid'"/>
                        <div class="invalid-feedback" th:errors="*{cinemaRoomName}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Số lượng ghế <span class="text-danger">*</span></label>
                        <input type="number" min="10" max="200" th:field="*{seatQuantity}" class="form-control"
                               th:classappend="${#fields.hasErrors('seatQuantity')} ? 'is-invalid'"/>
                        <div class="invalid-feedback" th:errors="*{seatQuantity}"></div>
                        <div class="form-text">
                            Hệ thống sẽ tự sinh sơ đồ ghế theo hàng A, B, C... với 10 ghế mỗi hàng.
                            1-2 hàng cuối sẽ được đặt là ghế VIP.
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success px-4">
                            <i class="bi bi-check-lg me-1"></i>Lưu
                        </button>
                        <a th:href="@{/admin/cinema-room}" class="btn btn-outline-secondary px-4">Hủy</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
