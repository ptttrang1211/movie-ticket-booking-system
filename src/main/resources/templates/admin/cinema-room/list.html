<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Quản lý phòng chiếu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body>
<div class="d-flex">
    <div class="sidebar bg-dark text-white p-3" style="min-width:220px;min-height:100vh">
        <h5 class="fw-bold mb-4"><i class="bi bi-camera-reels-fill text-danger me-2"></i>Admin</h5>
        <ul class="nav flex-column gap-1">
            <li><a th:href="@{/admin/movie/list}" class="nav-link text-white"><i class="bi bi-film me-2"></i>Phim</a></li>
            <li><a th:href="@{/admin/showtime/list}" class="nav-link text-white"><i class="bi bi-calendar3 me-2"></i>Lịch chiếu</a></li>
            <li><a th:href="@{/admin/cinema-room}" class="nav-link text-white active"><i class="bi bi-building me-2"></i>Phòng chiếu</a></li>
            <li><a th:href="@{/admin/employee/list}" class="nav-link text-white"><i class="bi bi-people me-2"></i>Nhân viên</a></li>
            <li><a th:href="@{/admin/promotion/list}" class="nav-link text-white"><i class="bi bi-tag me-2"></i>Khuyến mãi</a></li>
        </ul>
    </div>

    <div class="flex-grow-1 p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0">Quản lý phòng chiếu</h4>
            <a th:href="@{/admin/cinema-room/add}" class="btn btn-success">
                <i class="bi bi-plus-lg me-1"></i>Thêm phòng chiếu
            </a>
        </div>

        <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
        <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                    <tr>
                        <th>#</th>
                        <th>Chi nhánh</th>
                        <th>Phòng</th>
                        <th>Số ghế</th>
                        <th>VIP</th>
                        <th>Thường</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(rooms)}">
                        <td colspan="7" class="text-center text-muted py-4">Chưa có phòng chiếu nào</td>
                    </tr>
                    <tr th:each="room, stat : ${rooms}">
                        <td class="align-middle" th:text="${stat.index + 1}"></td>
                        <td class="align-middle" th:text="${room.branch.branchName}"></td>
                        <td class="align-middle fw-bold" th:text="${room.cinemaRoomName}"></td>
                        <td class="align-middle" th:text="${room.seatQuantity}"></td>
                        <td class="align-middle text-warning fw-semibold"
                            th:text="${#lists.size(room.seats.?[seatType.name() == 'VIP'])}"></td>
                        <td class="align-middle"
                            th:text="${#lists.size(room.seats.?[seatType.name() == 'NORMAL'])}"></td>
                        <td class="align-middle">
                            <div class="d-flex gap-1">
                                <a th:href="@{/admin/cinema-room/edit/{id}(id=${room.cinemaRoomId})}"
                                   class="btn btn-sm btn-outline-warning">
                                    <i class="bi bi-pencil"></i>
                                </a>
                                <form th:action="@{/admin/cinema-room/delete/{id}(id=${room.cinemaRoomId})}"
                                      method="post"
                                      onsubmit="return confirm('Xóa phòng chiếu này?')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-sm btn-outline-danger">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
