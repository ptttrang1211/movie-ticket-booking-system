<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Thêm nhân viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body>
<div class="d-flex">
    <div class="sidebar bg-dark text-white p-3" style="min-width:220px;min-height:100vh">
        <h5 class="fw-bold mb-4"><i class="bi bi-camera-reels-fill text-danger me-2"></i>Admin</h5>
        <ul class="nav flex-column gap-1">
            <li><a th:href="@{/admin/movie/list}" class="nav-link text-white"><i class="bi bi-film me-2"></i>Phim</a></li>
            <li><a th:href="@{/admin/showtime/list}" class="nav-link text-white"><i class="bi bi-calendar3 me-2"></i>Lịch chiếu</a></li>
            <li><a th:href="@{/admin/employee/list}" class="nav-link text-white active"><i class="bi bi-people me-2"></i>Nhân viên</a></li>
            <li><a th:href="@{/admin/promotion/list}" class="nav-link text-white"><i class="bi bi-tag me-2"></i>Khuyến mãi</a></li>
        </ul>
    </div>

    <div class="flex-grow-1 p-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold mb-0">Thêm nhân viên</h4>
            <a th:href="@{/admin/employee/list}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>Quay lại
            </a>
        </div>

        <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

        <div class="card shadow-sm">
            <div class="card-body">
                <form th:action="@{/admin/employee/add}" th:object="${employeeRequest}" method="post" class="row g-3">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Họ tên</label>
                        <input type="text" class="form-control" th:field="*{fullName}"/>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Username</label>
                        <input type="text" class="form-control" th:field="*{userName}"/>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('userName')}" th:errors="*{userName}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Email</label>
                        <input type="email" class="form-control" th:field="*{email}"/>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Mật khẩu</label>
                        <input type="password" class="form-control" th:field="*{password}"/>
                        <div class="form-text">Nhân viên mới cần password để đăng nhập.</div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">Số điện thoại</label>
                        <input type="text" class="form-control" th:field="*{phoneNumber}"/>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></div>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label fw-semibold">CMND/CCCD</label>
                        <input type="text" class="form-control" th:field="*{identityCard}"/>
                        <div class="text-danger small mt-1" th:if="${#fields.hasErrors('identityCard')}" th:errors="*{identityCard}"></div>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Giới tính</label>
                        <select class="form-select" th:field="*{gender}">
                            <option value="">-- Chọn --</option>
                            <option value="Nam">Nam</option>
                            <option value="Nữ">Nữ</option>
                            <option value="Khác">Khác</option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Ngày sinh</label>
                        <input type="date" class="form-control" th:field="*{dateOfBirth}"/>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-semibold">Địa chỉ</label>
                        <input type="text" class="form-control" th:field="*{address}"/>
                    </div>

                    <div class="col-12 d-flex justify-content-end gap-2 pt-2">
                        <a th:href="@{/admin/employee/list}" class="btn btn-outline-secondary">Hủy</a>
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-check-lg me-1"></i>Lưu nhân viên
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
