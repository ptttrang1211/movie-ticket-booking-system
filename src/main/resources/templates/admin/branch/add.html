<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Thêm chi nhánh</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body>
<div class="d-flex">
    <div class="sidebar bg-dark text-white p-3" style="min-width:220px;min-height:100vh">
        <h5 class="fw-bold mb-4"><i class="bi bi-camera-reels-fill text-danger me-2"></i>Admin</h5>
        <ul class="nav flex-column gap-1">
            <li><a th:href="@{/admin/movie/list}" class="nav-link text-white"><i class="bi bi-film me-2"></i>Phim</a></li>
            <li><a th:href="@{/admin/showtime/list}" class="nav-link text-white"><i class="bi bi-calendar3 me-2"></i>Lịch chiếu</a></li>
            <li><a th:href="@{/admin/cinema-room}" class="nav-link text-white"><i class="bi bi-building me-2"></i>Phòng chiếu</a></li>
            <li><a th:href="@{/admin/branch}" class="nav-link text-white active"><i class="bi bi-geo-alt me-2"></i>Chi nhánh</a></li>
            <li><a th:href="@{/admin/employee/list}" class="nav-link text-white"><i class="bi bi-people me-2"></i>Nhân viên</a></li>
            <li><a th:href="@{/admin/promotion/list}" class="nav-link text-white"><i class="bi bi-tag me-2"></i>Khuyến mãi</a></li>
        </ul>
    </div>

    <div class="flex-grow-1 p-4" style="max-width:760px">
        <div class="d-flex align-items-center gap-2 mb-4">
            <a th:href="@{/admin/branch}" class="btn btn-sm btn-outline-secondary">
                <i class="bi bi-arrow-left"></i>
            </a>
            <h4 class="fw-bold mb-0">Thêm chi nhánh</h4>
        </div>

        <div th:if="${errorMsg}" class="alert alert-danger" th:text="${errorMsg}"></div>

        <div class="card shadow-sm">
            <div class="card-body">
                <form th:action="@{/admin/branch/add}" th:object="${branchRequest}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Tên chi nhánh</label>
                        <input type="text" th:field="*{branchName}" class="form-control"/>
                        <div class="text-danger small mt-1" th:errors="*{branchName}"></div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Địa chỉ</label>
                        <input type="text" th:field="*{address}" class="form-control"/>
                        <div class="text-danger small mt-1" th:errors="*{address}"></div>
                    </div>

                    <div class="row g-3 mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Số điện thoại</label>
                            <input type="text" th:field="*{phone}" class="form-control"/>
                            <div class="text-danger small mt-1" th:errors="*{phone}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Email</label>
                            <input type="email" th:field="*{email}" class="form-control"/>
                            <div class="text-danger small mt-1" th:errors="*{email}"></div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Ảnh</label>
                        <input type="text" th:field="*{image}" class="form-control" placeholder="VD: branch-hanoi.jpg"/>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Google Map Embed URL</label>
                        <textarea th:field="*{mapEmbedUrl}" class="form-control" rows="3"></textarea>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Trạng thái</label>
                        <select th:field="*{branchStatus}" class="form-select">
                            <option th:each="status : ${statuses}" th:value="${status}" th:text="${status}"></option>
                        </select>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-success px-4">Lưu</button>
                        <a th:href="@{/admin/branch}" class="btn btn-outline-secondary px-4">Hủy</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
