<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Movie Theater</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #43cea2 0%, #6a82fb 50%, #fc5c7d 100%); padding: 90px 20px 30px; }
        .auth-nav { position: fixed; top: 0; left: 0; right: 0; height: 64px; padding: 0 28px; display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.94); box-shadow: 0 1px 12px rgba(0,0,0,0.08); z-index: 10; }
        .auth-nav-logo { font-size: 18px; font-weight: 700; color: #6a82fb; text-decoration: none; letter-spacing: 1px; }
        .auth-nav-logo span { color: #fc5c7d; }
        .auth-nav-links { display: flex; align-items: center; gap: 8px; }
        .auth-nav-links a { padding: 8px 14px; border-radius: 8px; font-size: 14px; font-weight: 600; color: #374151; text-decoration: none; transition: background 0.2s, color 0.2s; }
        .auth-nav-links a:hover { background: #eef0ff; color: #6a82fb; }
        .auth-box { background: #fff; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.18); padding: 40px 44px; width: 100%; max-width: 540px; }
        .auth-logo { text-align: center; font-size: 20px; font-weight: 700; color: #6a82fb; letter-spacing: 2px; margin-bottom: 8px; }
        h2 { text-align: center; font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 24px; letter-spacing: 1px; }
        .form-control { border: none; border-bottom: 1.5px solid #d1d5db; border-radius: 0; padding: 10px 4px; font-size: 14px; background: transparent; color: #111; box-shadow: none; }
        .form-control:focus { border-bottom-color: #6a82fb; background: transparent; box-shadow: none; }
        .form-control.is-invalid { border-bottom-color: #e53e3e; }
        .password-wrap { position: relative; }
        .password-wrap .form-control { padding-right: 36px; }
        .toggle-password { position: absolute; right: 4px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #9ca3af; font-size: 16px; padding: 0; }
        .toggle-password:hover { color: #6a82fb; }
        .error-text { display: block; color: #e53e3e; font-size: 12px; margin-top: 4px; }
        .gender-group { display: flex; gap: 24px; padding: 8px 4px; font-size: 14px; color: #374151; }
        .gender-group label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .btn-register { display: block; width: 100%; padding: 12px; border: none; border-radius: 50px; font-size: 15px; font-weight: 700; cursor: pointer; text-align: center; letter-spacing: 1px; margin-top: 8px; background: linear-gradient(90deg, #43cea2, #6a82fb, #fc5c7d); color: #fff; transition: opacity 0.2s; }
        .btn-register:hover { opacity: 0.88; }
        .alert-error { background-color: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
        .auth-link { text-align: center; margin-top: 16px; font-size: 13px; color: #6b7280; }
        .auth-link a { color: #6a82fb; text-decoration: none; font-weight: 500; }
        .auth-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<nav class="auth-nav">
    <a th:href="@{/home}" class="auth-nav-logo">🎬 TRANGGD<span>Cinema</span></a>
    <div class="auth-nav-links">
        <a th:href="@{/home}">Trang chủ</a>
        <a th:href="@{/movies}">Xem phim</a>
    </div>
</nav>
<div class="auth-box">
    <div class="auth-logo">🎬 TRANGGDCinema</div>
    <h2>REGISTER ACCOUNT</h2>

    <div th:if="${errorMsg}" class="alert-error" th:text="${errorMsg}"></div>

    <form th:action="@{/auth/register}" method="post" th:object="${registerRequest}">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="row g-3">
            <div class="col-md-6">
                <input type="text" th:field="*{username}" placeholder="Tên tài khoản"
                       class="form-control" th:classappend="${#fields.hasErrors('username')} ? ' is-invalid'"/>
                <span class="error-text" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
            </div>

            <div class="col-md-6">
                <input type="text" th:field="*{fullName}" placeholder="Họ và tên"
                       class="form-control" th:classappend="${#fields.hasErrors('fullName')} ? ' is-invalid'"/>
                <span class="error-text" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></span>
            </div>

            <div class="col-md-6">
                <div class="password-wrap">
                    <input type="password" th:field="*{password}" placeholder="Mật khẩu"
                           class="form-control" id="regPassword"
                           th:classappend="${#fields.hasErrors('password')} ? ' is-invalid'"/>
                    <button type="button" class="toggle-password" onclick="togglePassword('regPassword', this)">👁</button>
                </div>
                <span class="error-text" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
            </div>

            <div class="col-md-6">
                <div class="password-wrap">
                    <input type="password" th:field="*{confirmPassword}" placeholder="Xác nhận mật khẩu"
                           class="form-control" id="regConfirmPassword"/>
                    <button type="button" class="toggle-password" onclick="togglePassword('regConfirmPassword', this)">👁</button>
                </div>
            </div>

            <div class="col-md-6">
                <input type="email" th:field="*{email}" placeholder="Email"
                       class="form-control" th:classappend="${#fields.hasErrors('email')} ? ' is-invalid'"/>
                <span class="error-text" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
            </div>

            <div class="col-md-6">
                <input type="text" th:field="*{phoneNumber}" placeholder="Số điện thoại"
                       class="form-control" th:classappend="${#fields.hasErrors('phoneNumber')} ? ' is-invalid'"/>
                <span class="error-text" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}"></span>
            </div>

            <div class="col-md-6">
                <input type="text" th:field="*{identityCard}" placeholder="CMND/CCCD"
                       class="form-control" th:classappend="${#fields.hasErrors('identityCard')} ? ' is-invalid'"/>
                <span class="error-text" th:if="${#fields.hasErrors('identityCard')}" th:errors="*{identityCard}"></span>
            </div>

            <div class="col-md-6">
                <input type="date" th:field="*{dateOfBirth}" class="form-control"/>
            </div>

            <div class="col-12">
                <input type="text" th:field="*{address}" placeholder="Địa chỉ" class="form-control"/>
            </div>

            <div class="col-12">
                <div class="gender-group">
                    <label><input type="radio" th:field="*{gender}" value="Nam"/> Nam</label>
                    <label><input type="radio" th:field="*{gender}" value="Nu"/> Nữ</label>
                </div>
            </div>

            <div class="col-12">
                <button type="submit" class="btn-register">Đăng ký</button>
            </div>
        </div>
    </form>

    <div class="auth-link">
        Đã có tài khoản? <a th:href="@{/auth/login}">Đăng nhập</a>
    </div>
</div>
<script>
    function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        if (input.type === 'password') {
            input.type = 'text';
            btn.textContent = '🙈';
        } else {
            input.type = 'password';
            btn.textContent = '👁';
        }
    }
</script>
</body>
</html>
