<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Movie Theater</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #43cea2 0%, #6a82fb 50%, #fc5c7d 100%); padding: 84px 20px 24px; }
        .auth-nav { position: fixed; top: 0; left: 0; right: 0; height: 64px; padding: 0 28px; display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.94); box-shadow: 0 1px 12px rgba(0,0,0,0.08); z-index: 10; }
        .auth-nav-logo { font-size: 18px; font-weight: 700; color: #6a82fb; text-decoration: none; letter-spacing: 1px; }
        .auth-nav-logo span { color: #fc5c7d; }
        .auth-nav-links { display: flex; align-items: center; gap: 8px; }
        .auth-nav-links a { padding: 8px 14px; border-radius: 8px; font-size: 14px; font-weight: 600; color: #374151; text-decoration: none; transition: background 0.2s, color 0.2s; }
        .auth-nav-links a:hover { background: #eef0ff; color: #6a82fb; }
        .auth-box { background: #fff; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.18); padding: 40px 44px; width: 100%; max-width: 420px; }
        .auth-logo { text-align: center; font-size: 20px; font-weight: 700; color: #6a82fb; letter-spacing: 2px; margin-bottom: 8px; }
        h2 { text-align: center; font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 28px; letter-spacing: 1px; }
        .form-group { margin-bottom: 16px; position: relative; }
        .form-control { width: 100%; padding: 10px 40px 10px 14px; border: none; border-bottom: 1.5px solid #d1d5db; font-size: 14px; outline: none; background: transparent; color: #111; transition: border-color 0.2s; }
        .form-control:focus { border-bottom-color: #6a82fb; }
        .toggle-password { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #9ca3af; font-size: 16px; padding: 0; }
        .toggle-password:hover { color: #6a82fb; }
        .btn-submit { display: block; width: 100%; padding: 12px; border: none; border-radius: 50px; font-size: 15px; font-weight: 700; cursor: pointer; text-align: center; letter-spacing: 1px; margin-top: 8px; background: linear-gradient(90deg, #43cea2, #6a82fb, #fc5c7d); color: #fff; transition: opacity 0.2s; }
        .btn-submit:hover { opacity: 0.88; }
        .alert { padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
        .alert-error { background-color: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; }
        .alert-success { background-color: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
        .forgot-link { text-align: right; margin-top: -8px; margin-bottom: 12px; font-size: 13px; }
        .forgot-link a { color: #6a82fb; text-decoration: none; }
        .forgot-link a:hover { text-decoration: underline; }
        .auth-link { text-align: center; margin-top: 16px; font-size: 13px; color: #6b7280; }
        .auth-link a { color: #6a82fb; text-decoration: none; font-weight: 500; }
        .auth-link a:hover { text-decoration: underline; }
        .pending-alert { background: #fffbeb; border: 1px solid #fde68a; color: #92400e; padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
        .pending-alert a { color: #6a82fb; font-weight: 600; text-decoration: none; }
        .pending-alert a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<nav class="auth-nav">
    <a th:href="@{/home}" class="auth-nav-logo">🎬 TRANGGD<span>Cinema</span></a>
    <div class="auth-nav-links">
        <a th:href="@{/home}">Trang chủ</a>
        <a th:href="@{/movies}">Xem phim</a>
    </div>
</nav>
<div class="auth-box">
    <div class="auth-logo">🎬 TRANGGDCinema</div>
    <h2>LOGIN</h2>

    <!-- Lỗi thường -->
    <div th:if="${errorMsg != null and showVerifyOtpLink != true}"
         class="alert alert-error" th:text="${errorMsg}"></div>

    <!-- Tài khoản tồn tại nhưng chưa xác thực email -->
    <div th:if="${showVerifyOtpLink}"
         class="pending-alert">
        ⚠️ <span th:text="${errorMsg}"></span><br/>
        <a th:href="@{/auth/verify-otp(email=${pendingEmail})}">→ Quay lại nhập mã OTP</a>
    </div>

    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>

    <form th:action="@{/auth/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="form-group">
            <input type="text" name="username" placeholder="Tên tài khoản hoặc email"
                   class="form-control" required autofocus/>
        </div>

        <div class="form-group">
            <input type="password" name="password" placeholder="Mật khẩu"
                   class="form-control" id="loginPassword" required/>
            <button type="button" class="toggle-password" onclick="togglePassword('loginPassword', this)">👁</button>
        </div>

        <div class="forgot-link">
            <a th:href="@{/auth/forgot-password}">Quên mật khẩu?</a>
        </div>

        <button type="submit" class="btn-submit">&#10140; Đăng nhập</button>
    </form>

    <div class="auth-link">
        Chưa có tài khoản? <a th:href="@{/auth/register}">Đăng ký ngay!</a>
    </div>
</div>
<script>
    function togglePassword(inputId, btn) {
        const input = document.getElementById(inputId);
        if (input.type === 'password') {
            input.type = 'text';
            btn.textContent = '🙈';
        } else {
            input.type = 'password';
            btn.textContent = '👁';
        }
    }
</script>
</body>
</html>
