<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu - Movie Theater</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #43cea2 0%, #6a82fb 50%, #fc5c7d 100%);
            padding: 84px 20px 24px;
        }
        .auth-nav { position: fixed; top: 0; left: 0; right: 0; height: 64px; padding: 0 28px; display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.94); box-shadow: 0 1px 12px rgba(0,0,0,0.08); z-index: 10; }
        .auth-nav-logo { font-size: 18px; font-weight: 700; color: #6a82fb; text-decoration: none; letter-spacing: 1px; }
        .auth-nav-logo span { color: #fc5c7d; }
        .auth-nav-links { display: flex; align-items: center; gap: 8px; }
        .auth-nav-links a { padding: 8px 14px; border-radius: 8px; font-size: 14px; font-weight: 600; color: #374151; text-decoration: none; transition: background 0.2s, color 0.2s; }
        .auth-nav-links a:hover { background: #eef0ff; color: #6a82fb; }
        .auth-box { background: #fff; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.18); padding: 40px 44px; width: 100%; max-width: 420px; }
        .auth-logo { text-align: center; font-size: 20px; font-weight: 700; color: #6a82fb; letter-spacing: 2px; margin-bottom: 8px; }
        h2 { text-align: center; font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; letter-spacing: 1px; }
        .auth-subtitle { text-align: center; font-size: 13px; color: #6b7280; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-control { width: 100%; padding: 10px 14px; border: none; border-bottom: 1.5px solid #d1d5db; font-size: 14px; outline: none; background: transparent; color: #111; transition: border-color 0.2s; }
        .form-control:focus { border-bottom-color: #6a82fb; }
        .btn { display: block; width: 100%; padding: 12px; border: none; border-radius: 50px; font-size: 15px; font-weight: 700; cursor: pointer; text-align: center; letter-spacing: 1px; margin-top: 8px; background: linear-gradient(90deg, #43cea2, #6a82fb, #fc5c7d); color: #fff; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.88; }
        .alert { padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
        .alert-error { background-color: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; }
        .alert-success { background-color: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
        .error-text { display: block; color: #e53e3e; font-size: 12px; margin-top: 4px; }
        .auth-link { text-align: center; margin-top: 16px; font-size: 13px; color: #6b7280; }
        .auth-link a { color: #6a82fb; text-decoration: none; font-weight: 500; }
        .auth-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<nav class="auth-nav">
    <a th:href="@{/home}" class="auth-nav-logo">🎬 TRANGGD<span>Cinema</span></a>
    <div class="auth-nav-links">
        <a th:href="@{/home}">Trang chủ</a>
        <a th:href="@{/movies}">Xem phim</a>
    </div>
</nav>
<div class="auth-box">
    <div class="auth-logo">🎬 TRANGGDCinema</div>
    <h2>Đặt lại mật khẩu</h2>
    <p class="auth-subtitle">Nhập mã OTP và mật khẩu mới của bạn</p>

    <div th:if="${successMsg}" class="alert alert-success" th:text="${successMsg}"></div>
    <div th:if="${errorMsg}" class="alert alert-error" th:text="${errorMsg}"></div>

    <form th:action="@{/auth/reset-password}" th:object="${resetRequest}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="form-group">
            <input type="email" class="form-control" th:field="*{email}"
                   th:value="${email}" placeholder="Email của bạn" required />
            <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error-text"></span>
        </div>

        <div class="form-group">
            <input type="text" class="form-control" th:field="*{otp}"
                   placeholder="Nhập mã OTP 6 số" maxlength="6"
                   autocomplete="one-time-code" required />
            <span th:if="${#fields.hasErrors('otp')}" th:errors="*{otp}" class="error-text"></span>
        </div>

        <div class="form-group">
            <input type="password" class="form-control" th:field="*{newPassword}"
                   placeholder="Mật khẩu mới (tối thiểu 6 ký tự)" required />
            <span th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}" class="error-text"></span>
        </div>

        <div class="form-group">
            <input type="password" class="form-control" th:field="*{confirmPassword}"
                   placeholder="Xác nhận mật khẩu mới" required />
            <span th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}" class="error-text"></span>
        </div>

        <button type="submit" class="btn">Đặt lại mật khẩu</button>
    </form>

    <div class="auth-link">
        <a th:href="@{/auth/login}">← Quay lại đăng nhập</a>
    </div>
</div>
</body>
</html>
